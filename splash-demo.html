<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Splash Demo — Pulse</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .splash {
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.1rem;
      background:
        linear-gradient(rgba(32, 35, 31, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(32, 35, 31, 0.04) 1px, transparent 1px),
        #edf1ee;
      background-size: 72px 72px;
    }

    /* ── Orb ── */
    .orb {
      width: 72px;
      height: 72px;
      border-radius: 999px;
      background:
        radial-gradient(circle at 34% 28%, rgba(255, 255, 255, 0.76), transparent 32%),
        radial-gradient(circle at 54% 62%, #9fb38a, #66795f);
      box-shadow:
        inset 0 0 0 1px rgba(255, 255, 255, 0.5),
        0 4px 18px rgba(102, 121, 95, 0.28);
      animation: orb-pulse 1.8s ease-in-out infinite;
    }

    @keyframes orb-pulse {
      0%, 100% {
        transform: scale(1);
        box-shadow: inset 0 0 0 1px rgba(255,255,255,0.5), 0 4px 18px rgba(102,121,95,0.28);
      }
      50% {
        transform: scale(1.07);
        box-shadow: inset 0 0 0 1px rgba(255,255,255,0.5), 0 8px 28px rgba(102,121,95,0.42);
      }
    }

    /* ── Wordmark ── */
    .wordmark {
      font-size: 0.88rem;
      font-weight: 600;
      color: #20231f;
      letter-spacing: 0.01em;
    }

    /* ── Loading bar ── */
    .bar-track {
      width: 72px;
      height: 2px;
      background: rgba(32, 35, 31, 0.12);
      border-radius: 999px;
      overflow: hidden;
      margin-top: 0.2rem;
    }

    .bar-fill {
      height: 100%;
      border-radius: 999px;
      background: #66795f;
      animation: bar-load 2.2s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      transform-origin: left;
    }

    @keyframes bar-load {
      0%   { width: 0%;   opacity: 1; }
      80%  { width: 100%; opacity: 1; }
      100% { width: 100%; opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="splash">
    <div class="orb"></div>
    <span class="wordmark">Pulse</span>
    <div class="bar-track">
      <div class="bar-fill"></div>
    </div>
  </div>
</body>
</html>
